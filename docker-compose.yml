# =============================================================================
# docker compose 编排文件 —— 描述本机怎么把 Moji 容器跑起来。
# 一条 `docker compose up` 就按这里写的规矩启动。
# =============================================================================

services:
  moji:
    # 用当前目录的 Dockerfile 构建镜像
    build: .
    # 给构建出的镜像起个名字，方便下次识别
    image: moji:local
    container_name: moji

    # 端口映射：把容器里的 3611 映射到你 Mac 的 3611
    # 打开 http://localhost:3611 就能访问
    ports:
      - "3611:3611"

    # 关键：从你本机的 server/.env 读环境变量注入到容器
    # 这样 ANTHROPIC_API_KEY 只存在于运行时容器内存里，绝不进镜像、不进 git
    env_file:
      - ./server/.env

    # 持久化：SQLite 数据放到一个 docker 管理的 volume
    # 容器删了重建，日记还在（挂在 /app/server/data，正好是 db.js 期望的位置）
    volumes:
      - moji-data:/app/server/data

    # 意外崩溃自动重启（EC2 上省心）
    restart: unless-stopped

# 声明上面用到的 volume
volumes:
  moji-data:
