# =============================================================================
# GitHub Actions CI/CD
#   Job 1 (build)  —— 每次 push 都跑，验证 Docker 镜像能构建
#   Job 2 (deploy) —— 只有 main 分支的 push、build 绿了才跑：SSH 到 EC2 自动部署
# =============================================================================

name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------------
  # Job 1: Build —— 验证 Dockerfile 依然能构建（每次 push 都跑，包括 PR、别的分支）
  # -----------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: moji:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------------------
  # Job 2: Deploy —— 自动部署到 EC2
  # 触发条件（三个 AND）：
  #   1. Job 1 (build) 成功                    → needs: build
  #   2. 事件类型是 push（不是 PR）            → github.event_name == 'push'
  #   3. push 到 main 分支（不是 feature 分支） → github.ref == 'refs/heads/main'
  #
  # 三条一起保护你：只有"main 分支上代码构建成功"才真的动 EC2。
  # -----------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2 via SSH
        # appleboy/ssh-action —— 社区最广用的 SSH action，包装了 SSH 客户端
        uses: appleboy/ssh-action@v1
        with:
          # EC2 的 Elastic IP（对公网可见，不算 secret）
          host: 15.134.110.215
          # SSH 用户名（Ubuntu AMI 默认）
          username: ubuntu
          # 私钥从 GitHub Secrets 拉，永远不出现在日志里
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 真正在 EC2 上跑的命令块
          # 顶上 `set -e` 保证任一命令失败立刻退出（v1 action 无 script_stop 字段）
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd moji
            git pull

            echo "=== Building image ==="
            docker compose build

            echo "=== Restarting containers ==="
            docker compose up -d

            echo "=== Waiting for services ==="
            sleep 5

            echo "=== Health check ==="
            # -f 参数让 curl 在 HTTP 4xx/5xx 时返回非零 exit code
            # 从而让整个 workflow 显示失败
            curl -f http://localhost:3611/api/health
            echo ""
            echo "✓ Deploy successful"
